name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            pkg-config \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            libltdl-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxrender-dev \
            libxfixes-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libdbus-1-dev \
            libgl1-mesa-dev

      - name: Clone vcpkg
        shell: bash
        run: |
          if [ ! -f vcpkg/bootstrap-vcpkg.sh ] && [ ! -f vcpkg/bootstrap-vcpkg.bat ]; then
            rm -rf vcpkg
            git clone https://github.com/microsoft/vcpkg.git vcpkg
          fi

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/vcpkg
            ~/AppData/Local/vcpkg/archives
            ${{ github.workspace }}/vcpkg/downloads
          key: ${{ runner.os }}-${{ matrix.build_type }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', '**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.build_type }}-
            ${{ runner.os }}-

      - name: Bootstrap vcpkg (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: call vcpkg\bootstrap-vcpkg.bat

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: >
          cmake -S . -B build
          -A x64
          -DCMAKE_TOOLCHAIN_FILE=%GITHUB_WORKSPACE%\vcpkg\scripts\buildsystems\vcpkg.cmake

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --build-config ${{ matrix.build_type }}

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: smashorpass-${{ runner.os }}-${{ matrix.build_type }}
          path: |
            build/SmashOrPass
            build/src/SmashOrPass
          if-no-files-found: ignore

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: smashorpass-${{ runner.os }}-${{ matrix.build_type }}
          path: |
            build/Debug/SmashOrPass.exe
            build/Release/SmashOrPass.exe
            build/src/Debug/SmashOrPass.exe
            build/src/Release/SmashOrPass.exe
          if-no-files-found: ignore
